<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Insertar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4 text-center" style="max-width: 500px;">
      <h1 class="mb-4 text-dark">Insertar Nuevo Contacto</h1>
      <h2 class="h6 mb-4 text-secondary">Formulario de registro</h2>
      
      <form method="POST" class="text-start">
        <div class="mb-3">
          <label for="nombre" class="form-label text-dark">Nombre:</label>
          <input type="text" id="nombre" name="nombre" class="form-control border-dark" required>
        </div>
        <div class="mb-3">
          <label for="primer_apellido" class="form-label text-dark">Primer Apellido:</label>
          <input type="text" id="primer_apellido" name="primer_apellido" class="form-control border-dark" required>
        </div>
        <div class="mb-3">
          <label for="segundo_apellido" class="form-label text-dark">Segundo Apellido:</label>
          <input type="text" id="segundo_apellido" name="segundo_apellido" class="form-control border-dark">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label text-dark">Email:</label>
          <input type="email" id="email" name="email" class="form-control border-dark" required>
        </div>
        <div class="mb-3">
          <label for="telefono" class="form-label text-dark">Teléfono:</label>
          <input type="text" id="telefono" name="telefono" class="form-control border-dark">
        </div>
        <div class="d-flex justify-content-between mt-4">
          <button type="submit" class="btn btn-outline-danger">Guardar</button>
          <a href="/lista_contactos" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </body>
</html>
