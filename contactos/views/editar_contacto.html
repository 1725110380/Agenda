$def with(contacto)

<h1>Editar Contacto</h1>
<a href="/lista_contactos">Volver</a>

<form method="POST">

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="$contacto['nombre']" required>

        <label for="primer_apellido">Primer Apellido:</label>
        <input type="text" id="primer_apellido" name="primer_apellido" value="$contacto['primer_apellido']" required>

        <label for="segundo_apellido">Segundo Apellido:</label>
        <input type="text" id="segundo_apellido" name="segundo_apellido" value="$contacto['segundo_apellido']" required>
    

    
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="$contacto['email']" required>
    

    
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" value="$contacto['telefono']" required>
   


        <button type="submit">Guardar Cambios</button>
        <button type="reset">Limpiar</button>
        <a href="/lista_contactos"><button type="button">Cancelar</button></a>

</form>
